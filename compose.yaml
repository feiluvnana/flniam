services:
  mysql:
    image: mysql:latest
    container_name: mysql
    environment:
      MYSQL_DATABASE: flniam
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  server:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  mysql_data:
